name: CI/CD - AAS MCP Server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run unit tests
        run: |
          uv run pytest tests/ \
            --verbose \
            --cov=src/aas_mcp_server \
            --cov-report=term-missing \
            --cov-report=xml \
            -m "not integration"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      basyx-aas-repo:
        image: eclipsebasyx/aas-environment:2.0.0
        ports:
          - 8081:8081
        env:
          BaSyxContext: /
          BaSyxAASServerBackend: InMemory
        options: >-
          --health-cmd "curl -f http://localhost:8081/shells || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Wait for backend service
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:8081/shells; do sleep 2; done'

      - name: Run integration tests
        run: |
          uv run pytest tests/test_integration_comprehensive.py \
            --verbose \
            --run-integration \
            --cov=src/aas_mcp_server \
            --cov-report=term-missing

      - name: Test MCP server startup
        run: |
          # Create minimal test config
          mkdir -p test-fixtures

          # Create test config using docs files
          cat > test-fixtures/config.yaml << 'CONFIGEOF'
          components:
            aas-repo:
              official_spec: docs/openapi/AssetAdministrationShellRepositoryServiceSpecification-V3.1.1_SSP-001-resolved.yaml
              curation:
                allowlist:
                  - [get, "*"]
                aliases: {}
          CONFIGEOF

          # Test that server starts and responds to MCP initialize
          echo '{"jsonrpc": "2.0", "id": 1, "method": "initialize", "params": {"protocolVersion": "2024-11-05", "capabilities": {}, "clientInfo": {"name": "test", "version": "1.0"}}}' | \
          uv run aas-mcp-server \
            --component aas-repo \
            --base-url http://localhost:8081 \
            --config test-fixtures/config.yaml \
            --log-level WARNING | \
          jq -e '.result.serverInfo.name == "AAS MCP Server (aas-repo)"'

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run ruff (linter)
        run: |
          uv run ruff check src/ tests/
        continue-on-error: true

      - name: Run ruff (formatter check)
        run: |
          uv run ruff format --check src/ tests/
        continue-on-error: true

      - name: Run mypy (type checking)
        run: |
          uv run mypy src/
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aas-mcp-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # Create test config
          mkdir -p test-config
          cat > test-config/config.yaml << 'CONFIGEOF'
          components:
            aas-repo:
              official_spec: /app/docs/openapi/AssetAdministrationShellRepositoryServiceSpecification-V3.1.1_SSP-001-resolved.yaml
              curation:
                allowlist:
                  - [get, "*"]
                aliases: {}
          CONFIGEOF

          # Test that Docker container starts
          echo '{"jsonrpc": "2.0", "id": 1, "method": "initialize", "params": {"protocolVersion": "2024-11-05", "capabilities": {}, "clientInfo": {"name": "test", "version": "1.0"}}}' | \
          docker run -i \
            -v $(pwd)/test-config/config.yaml:/app/config/config.yaml \
            -v $(pwd)/docs:/app/docs \
            -e AAS_COMPONENT=aas-repo \
            -e AAS_BASE_URL=http://host.docker.internal:8081 \
            aas-mcp-server:test | \
          jq -e '.result.serverInfo.name == "AAS MCP Server (aas-repo)"'

  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [test, integration-test, lint, docker]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi

          if [ "${{ needs.integration-test.result }}" != "success" ]; then
            echo "❌ Integration tests failed"
            exit 1
          fi

          if [ "${{ needs.docker.result }}" != "success" ]; then
            echo "❌ Docker build failed"
            exit 1
          fi

          echo "✅ All tests passed!"
