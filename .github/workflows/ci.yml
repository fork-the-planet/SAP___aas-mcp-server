name: CI/CD - AAS MCP Server

on:
  push:
    branches: [ main ]
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run unit tests
        run: |
          uv run pytest tests/ \
            --verbose \
            --cov=src/aas_mcp_server \
            --cov-report=term-missing \
            --cov-report=xml \
            -m "not integration"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run ruff (linter)
        run: |
          uv run ruff check src/ tests/
        continue-on-error: true

      - name: Run ruff (formatter check)
        run: |
          uv run ruff format --check src/ tests/
        continue-on-error: true

      - name: Run mypy (type checking)
        run: |
          uv run mypy src/
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          # load=true exports the image to the local Docker daemon so
          # subsequent docker run steps can find it by tag.
          # push=false keeps it local only (no registry push).
          load: true
          push: false
          tags: aas-mcp-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and responds to MCP initialize
        run: |
          # Create a minimal config pointing at the fixture spec that ships
          # in the repository (the image itself contains no spec files).
          mkdir -p test-config
          cat > test-config/config.yaml << 'CONFIGEOF'
          components:
            aas-repo:
              official_spec: /app/spec/sample_official_spec.yaml
              curation:
                allowlist:
                  - [get, "*"]
                aliases: {}
          CONFIGEOF

          # Send a single MCP initialize request and verify the server name
          # in the response. The container exits naturally after stdio closes.
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' | \
          docker run --rm -i \
            -v "$(pwd)/test-config/config.yaml:/app/config/config.yaml" \
            -v "$(pwd)/tests/fixtures/sample_official_spec.yaml:/app/spec/sample_official_spec.yaml" \
            -e AAS_COMPONENT=aas-repo \
            -e AAS_BASE_URL=http://localhost:8081 \
            aas-mcp-server:test | \
          jq -e '.result.serverInfo.name == "AAS MCP Server (aas-repo)"'

  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [test, lint, docker]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi

          if [ "${{ needs.docker.result }}" != "success" ]; then
            echo "❌ Docker build failed"
            exit 1
          fi

          echo "✅ All tests passed!"
