name: Version Bump

# Triggers on PR activity against main.
# The PR title must follow Conventional Commits to determine the bump level:
#
#   feat:           → minor  (0.1.0 → 0.2.0)
#   fix: / chore:   → patch  (0.1.0 → 0.1.1)
#   feat!: / fix!:  → major  (0.1.0 → 1.0.0)
#
# The bumped version is committed back to the PR branch before merge.

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Python Project Version Bump
        uses: sap/pull-request-semver-bumper@v1
        with:
          type: python
          token: ${{ secrets.GITHUB_TOKEN }}
