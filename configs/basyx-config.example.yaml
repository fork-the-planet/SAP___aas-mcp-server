# Eclipse BaSyx Implementation Configuration (EXAMPLE)
#
# This is an EXAMPLE configuration for Eclipse BaSyx v2.0.
# It demonstrates how to configure the MCP server for a specific AAS implementation.
#
# To use this example:
#   python3 scripts/generate_implementation.py --config configs/basyx-config.example.yaml
#
# To create your own configuration:
#   1. Copy config.yaml.template to your-config.yaml
#   2. Customize it for your implementation
#   3. Generate specs with your config file

name: Eclipse BaSyx (Example)
version: v2.0
description: Example configuration for Eclipse BaSyx AAS server implementation

# Component configurations
# Each component specifies:
#   - implementation_spec: Path to the OpenAPI spec documenting the implementation's endpoints
#   - official_spec: Path to the official AAS OpenAPI specification
#   - path_prefix: Optional prefix to filter paths (e.g., "/shells" for AAS repo, null for registries)
#   - overlay: Path to OpenAPI Overlay file (optional, for renaming operations)
#   - curation: Allowlist and aliases for tool curation (optional, used at runtime)

components:
  aas-repo:
    implementation_spec: docs/basyx-repo-supported-endpoints.json
    official_spec: openapi/AssetAdministrationShellRepositoryServiceSpecification-V3.1.1_SSP-001-resolved.yaml
    path_prefix: /shells
    description: Asset Administration Shell Repository
    overlay: openapi/overlays/aas-repo-overlay.yaml
    # Curation settings (optional - can be omitted to use defaults from tool_curation.py)
    # curation:
    #   allowlist:
    #     - [get, /shells]
    #     - [post, /shells]
    #     - [get, /shells/{aasIdentifier}]
    #   aliases:
    #     GetAllAssetAdministrationShells: list_shells

  submodel-repo:
    implementation_spec: docs/basyx-repo-supported-endpoints.json
    official_spec: openapi/SubmodelRepositoryServiceSpecification-V3.1.1_SSP-001-resolved.yaml
    path_prefix: /submodels
    description: Submodel Repository
    overlay: openapi/overlays/submodel-repo-overlay.yaml

  aas-registry:
    implementation_spec: docs/basyx-aas-registry-supported-endpoints.json
    official_spec: openapi/AssetAdministrationShellRegistryServiceSpecification-V3.1.1_SSP-001-resolved.yaml
    path_prefix: null
    description: Asset Administration Shell Registry
    overlay: openapi/overlays/aas-registry-overlay.yaml

  submodel-registry:
    implementation_spec: docs/basyx-submodel-registry-supported-endpoints.json
    official_spec: openapi/SubmodelRegistryServiceSpecification-V3.1.1_SSP-001-resolved.yaml
    path_prefix: null
    description: Submodel Registry
    overlay: openapi/overlays/submodel-registry-overlay.yaml

# Notes:
# - The path_prefix is used to filter paths from combined implementation specs
#   (e.g., basyx-repo-supported-endpoints.json contains both /shells and /submodels paths)
# - Set path_prefix to null when the implementation spec only contains paths for that component
# - Overlay files are applied during derived spec generation (scripts/generate_derived_spec.py)
# - Curation settings are applied at runtime when the MCP server starts (src/aas_mcp_server/tool_curation.py)
