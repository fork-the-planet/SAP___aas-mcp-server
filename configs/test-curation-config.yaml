# Test Configuration with Curation Settings
#
# This is a test configuration to demonstrate curation settings.

name: Test Implementation
version: v1.0
description: Test configuration with custom curation settings

components:
  aas-repo:
    implementation_spec: docs/basyx-repo-supported-endpoints.json
    official_spec: openapi/AssetAdministrationShellRepositoryServiceSpecification-V3.1.1_SSP-001-resolved.yaml
    path_prefix: /shells
    description: Asset Administration Shell Repository

    # Curation settings - these will now be loaded and used at runtime!
    curation:
      allowlist:
        # Expose GET and POST for /shells
        - [get, /shells]
        - [post, /shells]
        # Expose operations for individual shells
        - [get, /shells/{aasIdentifier}]
        - [put, /shells/{aasIdentifier}]
        - [delete, /shells/{aasIdentifier}]

      aliases:
        # Custom LLM-friendly names
        GetAllAssetAdministrationShells: list_shells
        GetAssetAdministrationShellById: get_shell
        PostAssetAdministrationShell: create_shell
        PutAssetAdministrationShellById: update_shell
        DeleteAssetAdministrationShellById: delete_shell
