openapi: 3.0.3
info:
  title: DotAAS Part 2 | HTTP/REST | Submodel Repository Service Specification
  description: "The entire Submodel Repository Service Specification as part of the\
    \ [Specification of the Asset Administration Shell: Part 2](https://industrialdigitaltwin.org/en/content-hub/aasspecifications).\
    \  \nCopyright: Industrial Digital Twin Association (IDTA) 2025"
  contact:
    name: Industrial Digital Twin Association (IDTA)
    email: info@idtwin.org
  license:
    name: CC BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/
  version: V3.1.1_SSP-001
  x-profile-identifier: https://admin-shell.io/aas/API/3/1/SubmodelRepositoryServiceSpecification/SSP-001
servers:
- url: https://admin-shell.io/api/v3/
- url: https://example.com/
paths:
  /submodels:
    get:
      tags:
      - Submodel Repository API
      summary: List all Submodels
      operationId: list_submodels
      parameters:
      - name: semanticId
        in: query
        description: The value of the semantic id reference (BASE64-URL-encoded)
        schema:
          maxLength: 3072
          minLength: 1
          type: string
      - name: idShort
        in: query
        description: The Asset Administration Shell’s IdShort
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: limit
        in: query
        description: The maximum number of elements in the response array
        required: false
        schema:
          minimum: 1
          type: integer
      - name: cursor
        in: query
        description: A server-generated identifier retrieved from pagingMetadata that
          specifies from which position the result listing should continue
        required: false
        schema:
          type: string
      - name: level
        in: query
        description: Determines the structural depth of the respective resource content
        required: false
        schema:
          type: string
          enum:
          - deep
          - core
          default: deep
      - name: extent
        in: query
        description: Determines to which extent the resource is being serialized
        required: false
        schema:
          type: string
          enum:
          - withBlobValue
          - withoutBlobValue
          default: withoutBlobValue
      responses:
        '200':
          description: Requested Submodels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSubmodelsResult'
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/forbidden'
        '500':
          $ref: '#/components/responses/internal-server-error'
        default:
          $ref: '#/components/responses/default'
      x-semanticIds:
      - https://admin-shell.io/aas/API/GetAllSubmodels/3/1
      - https://admin-shell.io/aas/API/GetAllSubmodelsBySemanticId/3/1
      - https://admin-shell.io/aas/API/GetAllSubmodelsByIdShort/3/1
      description: Retrieves all Submodels from the Submodel Repository
    post:
      tags:
      - Submodel Repository API
      summary: Create a new Submodel
      operationId: create_submodel
      requestBody:
        description: Submodel object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Submodel'
        required: true
      responses:
        '201':
          description: Submodel created successfully
          headers:
            Location:
              description: URL of the newly created resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submodel'
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/forbidden'
        '409':
          $ref: '#/components/responses/conflict'
        '500':
          $ref: '#/components/responses/internal-server-error'
        default:
          $ref: '#/components/responses/default'
      x-semanticIds:
      - https://admin-shell.io/aas/API/PostSubmodel/3/1
      description: Creates a new Submodel in the Submodel Repository
