            items:
              $ref: '#/components/schemas/SubmodelElement_choice'
          modelType:
            pattern: ^SubmodelElementList$
    AasSubmodelElements:
      type: string
      enum:
      - AnnotatedRelationshipElement
      - BasicEventElement
      - Blob
      - Capability
      - DataElement
      - Entity
      - EventElement
      - File
      - MultiLanguageProperty
      - Operation
      - Property
      - Range
      - ReferenceElement
      - RelationshipElement
      - SubmodelElement
      - SubmodelElementCollection
      - SubmodelElementList
    Result:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    Message:
      type: object
      properties:
        code:
          maxLength: 32
          minLength: 1
          type: string
        correlationId:
          maxLength: 128
          minLength: 1
          type: string
        messageType:
          type: string
          enum:
          - Undefined
          - Info
          - Warning
          - Error
          - Exception
        text:
          type: string
        timestamp:
          pattern: ^-?(([1-9][0-9][0-9][0-9]+)|(0[0-9][0-9][0-9]))-((0[1-9])|(1[0-2]))-((0[1-9])|([12][0-9])|(3[01]))T(((([01][0-9])|(2[0-3])):[0-5][0-9]:([0-5][0-9])(\.[0-9]+)?)|24:00:00(\.0+)?)(Z|\+00:00|-00:00)$
          type: string
    GetSubmodelsMetadataResult:
      allOf:
      - $ref: '#/components/schemas/PagedResult'
      - type: object
        properties:
          result:
            type: array
            items:
              $ref: '#/components/schemas/SubmodelMetadata'
    SubmodelMetadata:
      allOf:
      - $ref: '#/components/schemas/Identifiable'
      - $ref: '#/components/schemas/HasDataSpecification'
      - $ref: '#/components/schemas/Qualifiable'
      - $ref: '#/components/schemas/HasSemantics'
      - $ref: '#/components/schemas/HasKind'
    GetSubmodelsValueResult:
      allOf:
      - $ref: '#/components/schemas/PagedResult'
      - type: object
        properties:
          result:
            $ref: '#/components/schemas/SubmodelValue'
    SubmodelValue:
      type: object
      description: The ValueOnly serialization (patternProperties and propertyNames
        will probably be supported with OpenApi 3.1). For the full description of
        the generic JSON validation schema see the ValueOnly-Serialization as defined
        in the 'Specification of the Asset Administration Shell - Part 2'.
    GetReferencesResult:
      allOf:
      - $ref: '#/components/schemas/PagedResult'
      - type: object
        properties:
          result:
            type: array
            items:
              $ref: '#/components/schemas/Reference'
    GetPathItemsResult:
      allOf:
      - $ref: '#/components/schemas/PagedResult'
      - type: object
        properties:
          result:
            type: array
            items:
              $ref: '#/components/schemas/PathItem'
    PathItem:
      pattern: ^(([A-Za-z][A-Za-z0-9_]+)|(\[[0-9]+\]))((\.[A-Za-z][A-Za-z0-9_]+)|(\[[0-9]+\])){0,}$
      type: string
    GetSubmodelElementsResult:
      allOf:
      - $ref: '#/components/schemas/PagedResult'
      - type: object
        properties:
          result:
            type: array
            items:
              $ref: '#/components/schemas/SubmodelElement'
    GetSubmodelElementsMetadataResult:
      allOf:
      - $ref: '#/components/schemas/PagedResult'
      - type: object
        properties:
          result:
            type: array
            items:
              $ref: '#/components/schemas/SubmodelElementMetadata'
    SubmodelElementMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
      oneOf:
      - $ref: '#/components/schemas/BlobMetadata'
      - $ref: '#/components/schemas/FileMetadata'
      - $ref: '#/components/schemas/CapabilityMetadata'
      - $ref: '#/components/schemas/EntityMetadata'
      - $ref: '#/components/schemas/BasicEventElementMetadata'
      - $ref: '#/components/schemas/MultiLanguagePropertyMetadata'
      - $ref: '#/components/schemas/OperationMetadata'
      - $ref: '#/components/schemas/PropertyMetadata'
      - $ref: '#/components/schemas/RangeMetadata'
      - $ref: '#/components/schemas/ReferenceElementMetadata'
      - $ref: '#/components/schemas/AnnotatedRelationshipElementMetadata'
      - $ref: '#/components/schemas/RelationshipElementMetadata'
      - $ref: '#/components/schemas/SubmodelElementListMetadata'
      - $ref: '#/components/schemas/SubmodelElementCollectionMetadata'
    SubmodelElementAttributes:
      allOf:
      - $ref: '#/components/schemas/Referable'
      - $ref: '#/components/schemas/HasDataSpecification'
      - $ref: '#/components/schemas/HasSemantics'
      - $ref: '#/components/schemas/Qualifiable'
      - $ref: '#/components/schemas/HasKind'
    BlobMetadata:
      allOf:
      - $ref: '#/components/schemas/Referable'
      - $ref: '#/components/schemas/HasDataSpecification'
      - $ref: '#/components/schemas/HasSemantics'
      - $ref: '#/components/schemas/Qualifiable'
      - $ref: '#/components/schemas/HasKind'
    FileMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    CapabilityMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    EntityMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    BasicEventElementMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
      - properties:
          direction:
            $ref: '#/components/schemas/Direction'
          state:
            $ref: '#/components/schemas/StateOfEvent'
          messageTopic:
            maxLength: 255
            type: string
          messageBroker:
            $ref: '#/components/schemas/Reference'
          lastUpdate:
            type: string
          minInterval:
            type: string
          maxInterval:
            type: string
    MultiLanguagePropertyMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    OperationMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    PropertyMetadata:
      properties:
        valueType:
          $ref: '#/components/schemas/DataTypeDefXsd'
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    RangeMetadata:
      properties:
        valueType:
          $ref: '#/components/schemas/DataTypeDefXsd'
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    ReferenceElementMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    AnnotatedRelationshipElementMetadata:
      allOf:
      - $ref: '#/components/schemas/Referable'
      - $ref: '#/components/schemas/HasDataSpecification'
      - $ref: '#/components/schemas/HasSemantics'
      - $ref: '#/components/schemas/Qualifiable'
      - $ref: '#/components/schemas/HasKind'
    RelationshipElementMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    SubmodelElementListMetadata:
      properties:
        orderRelevant:
          type: boolean
        semanticIdListElement:
          $ref: '#/components/schemas/Reference'
        typeValueListElement:
          $ref: '#/components/schemas/ModelType'
        valueTypeListElement:
          $ref: '#/components/schemas/DataTypeDefXsd'
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    SubmodelElementCollectionMetadata:
      allOf:
      - $ref: '#/components/schemas/SubmodelElementAttributes'
    GetSubmodelElementsValueResult:
      allOf:
      - $ref: '#/components/schemas/PagedResult'
      - type: object
        properties:
          result:
            type: object
            description: Since patternProperties and propertyNames are not supported
              by OpenApi yet, the ValueOnly serialization for this elements works
              with the key-attribute as the JSON-property name and the value-attribute
              as the corresponding value.
    SubmodelElementValue:
      oneOf:
      - $ref: '#/components/schemas/BasicEventElementValue'
      - $ref: '#/components/schemas/PropertyValue'
      - $ref: '#/components/schemas/MultiLanguagePropertyValue'
      - $ref: '#/components/schemas/BlobValue'
      - $ref: '#/components/schemas/FileValue'
      - $ref: '#/components/schemas/RangeValue'
      - $ref: '#/components/schemas/ReferenceElementValue'
      - $ref: '#/components/schemas/RelationshipElementValue'
      - $ref: '#/components/schemas/AnnotatedRelationshipElementValue'
      - $ref: '#/components/schemas/EntityValue'
      - $ref: '#/components/schemas/SubmodelElementCollectionValue'
      - $ref: '#/components/schemas/SubmodelElementListValue'
    BasicEventElementValue:
      required:
      - observed
      type: object
      properties:
        observed:
          $ref: '#/components/schemas/ReferenceValue'
    ReferenceValue:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ReferenceTypes'
        keys:
          type: array
          items:
            $ref: '#/components/schemas/Key'
    PropertyValue:
      oneOf:
      - $ref: '#/components/schemas/StringValue'
      - $ref: '#/components/schemas/NumberValue'
      - $ref: '#/components/schemas/BooleanValue'
    StringValue:
      type: string
    NumberValue:
      type: number
    BooleanValue:
      type: boolean
    MultiLanguagePropertyValue:
      type: object
      description: Since patternProperties and propertyNames are not supported by
        OpenApi yet, the ValueOnly serialization for this elements works with the
        key-attribute as the JSON-property name and the value-attribute as the corresponding
        value.
    BlobValue:
      type: object
      properties:
        contentType:
          maxLength: 128
          minLength: 1
          type: string
        value:
          minLength: 1
          type: string
    FileValue:
      type: object
      properties:
        contentType:
          maxLength: 128
          minLength: 1
          type: string
        value:
          maxLength: 2048
          minLength: 1
          type: string
    RangeValue:
      required:
      - max
      - min
      type: object
      properties:
        max:
          type: number
        min:
          type: number
    ReferenceElementValue:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ReferenceTypes'
        keys:
          type: array
          items:
            $ref: '#/components/schemas/Key'
    RelationshipElementValue:
      type: object
      properties:
        first:
          $ref: '#/components/schemas/ReferenceValue'
        second:
          $ref: '#/components/schemas/ReferenceValue'
    AnnotatedRelationshipElementValue:
      type: object
      properties:
        first:
          $ref: '#/components/schemas/ReferenceValue'
        second:
          $ref: '#/components/schemas/ReferenceValue'
        annotations:
          $ref: '#/components/schemas/ValueOnly'
    ValueOnly:
      type: object
      description: The ValueOnly serialization (patternProperties and propertyNames
        will probably be supported with OpenApi 3.1). For the full description of
        the generic JSON validation schema see the ValueOnly-Serialization as defined
        in the 'Specification of the Asset Administration Shell - Part 2'.
    EntityValue:
      type: object
      properties:
        entityType:
          $ref: '#/components/schemas/EntityType'
        globalAssetId:
          maxLength: 2048
          minLength: 1
          pattern: ^([\\x09\\x0a\\x0d\\x20-\\ud7ff\\ue000-\\ufffd]|\\ud800[\\udc00-\\udfff]|[\\ud801-\\udbfe][\\udc00-\\udfff]|\\udbff[\\udc00-\\udfff])*$
          type: string
        specificAssetIds:
          type: array
          items:
            $ref: '#/components/schemas/SpecificAssetIdValue'
        statements:
          $ref: '#/components/schemas/ValueOnly'
    SpecificAssetIdValue:
      type: object
      description: Since patternProperties and propertyNames are not supported by
        OpenApi yet, the ValueOnly serialization for this elements works with the
        key-attribute as the JSON-property name and the value-attribute as the corresponding
        value.
    SubmodelElementCollectionValue:
      type: object
      description: The ValueOnly serialization (patternProperties and propertyNames
        will probably be supported with OpenApi 3.1). For the full description of
        the generic JSON validation schema see the ValueOnly-Serialization as defined
        in the 'Specification of the Asset Administration Shell - Part 2'.
    SubmodelElementListValue:
      type: array
      items:
        $ref: '#/components/schemas/SubmodelElementValue'
    OperationRequest:
      type: object
      properties:
        inoutputArguments:
          type: array
          items:
            $ref: '#/components/schemas/OperationVariable'
        inputArguments:
          type: array
          items:
            $ref: '#/components/schemas/OperationVariable'
        clientTimeoutDuration:
          pattern: ^(-?)P(?=.)((\d+)Y)?((\d+)M)?((\d+)D)?(T(?=.)((\d+)H)?((\d+)M)?(\d*(\.\d+)?S)?)?$
          type: string
    OperationResult:
      type: object
      allOf:
      - $ref: '#/components/schemas/BaseOperationResult'
      - properties:
          inoutputArguments:
            type: array
            items:
              $ref: '#/components/schemas/OperationVariable'
          outputArguments:
            type: array
            items:
              $ref: '#/components/schemas/OperationVariable'
    BaseOperationResult:
      allOf:
      - $ref: '#/components/schemas/Result'
      - properties:
          executionState:
            $ref: '#/components/schemas/ExecutionState'
          success:
            type: boolean
    ExecutionState:
      type: string
      enum:
      - Initiated
      - Running
      - Completed
      - Canceled
      - Failed
      - Timeout
    OperationRequestValueOnly:
      required:
      - clientTimeoutDuration
      type: object
      properties:
        inoutputArguments:
          $ref: '#/components/schemas/ValueOnly'
        inputArguments:
          $ref: '#/components/schemas/ValueOnly'
        clientTimeoutDuration:
          pattern: ^(-?)P(?=.)((\d+)Y)?((\d+)M)?((\d+)D)?(T(?=.)((\d+)H)?((\d+)M)?(\d*(\.\d+)?S)?)?$
          type: string
