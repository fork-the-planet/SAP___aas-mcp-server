              schema:
                $ref: '#/components/schemas/Submodel'
        '204':
          description: Submodel updated successfully
        '400':
          $ref: '#/components/responses/bad-request'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          $ref: '#/components/responses/forbidden'
        '500':
