overlay: 1.0.0
info:
  title: AAS Registry Overlay
  version: 1.0.0
  description: Overlay to improve operationIds and descriptions for AAS Registry operations

actions:
  # /description
  - target: "$.paths['/description'].get"
    update:
      operationId: get_registry_description
      summary: Get registry self-description
      description: Retrieves the self-description of the AAS Registry service

  # /shell-descriptors
  - target: "$.paths['/shell-descriptors'].get"
    update:
      operationId: list_shell_descriptors
      summary: List all AAS descriptors
      description: Retrieves all Asset Administration Shell descriptors from the registry

  - target: "$.paths['/shell-descriptors'].post"
    update:
      operationId: register_shell_descriptor
      summary: Register an AAS descriptor
      description: Registers a new Asset Administration Shell descriptor in the registry

  # /shell-descriptors/{aasIdentifier}
  - target: "$.paths['/shell-descriptors/{aasIdentifier}'].get"
    update:
      operationId: get_shell_descriptor_by_id
      summary: Get an AAS descriptor by ID
      description: Retrieves a specific Asset Administration Shell descriptor by its identifier

  - target: "$.paths['/shell-descriptors/{aasIdentifier}'].put"
    update:
      operationId: update_shell_descriptor_by_id
      summary: Update an AAS descriptor by ID
      description: Updates an existing Asset Administration Shell descriptor by its identifier

  - target: "$.paths['/shell-descriptors/{aasIdentifier}'].delete"
    update:
      operationId: unregister_shell_descriptor_by_id
      summary: Unregister an AAS descriptor by ID
      description: Removes an Asset Administration Shell descriptor from the registry by its identifier

  # /shell-descriptors/{aasIdentifier}/submodel-descriptors
  - target: "$.paths['/shell-descriptors/{aasIdentifier}/submodel-descriptors'].get"
    update:
      operationId: list_submodel_descriptors_for_shell
      summary: List Submodel descriptors for an AAS
      description: Retrieves all Submodel descriptors associated with a specific Asset Administration Shell

  - target: "$.paths['/shell-descriptors/{aasIdentifier}/submodel-descriptors'].post"
    update:
      operationId: register_submodel_descriptor_for_shell
      summary: Register a Submodel descriptor for an AAS
      description: Registers a new Submodel descriptor for a specific Asset Administration Shell

  # /shell-descriptors/{aasIdentifier}/submodel-descriptors/{submodelIdentifier}
  - target: "$.paths['/shell-descriptors/{aasIdentifier}/submodel-descriptors/{submodelIdentifier}'].get"
    update:
      operationId: get_submodel_descriptor_by_id_for_shell
      summary: Get a Submodel descriptor by ID for an AAS
      description: Retrieves a specific Submodel descriptor associated with an Asset Administration Shell

  - target: "$.paths['/shell-descriptors/{aasIdentifier}/submodel-descriptors/{submodelIdentifier}'].put"
    update:
      operationId: update_submodel_descriptor_by_id_for_shell
      summary: Update a Submodel descriptor by ID for an AAS
      description: Updates an existing Submodel descriptor associated with an Asset Administration Shell

  - target: "$.paths['/shell-descriptors/{aasIdentifier}/submodel-descriptors/{submodelIdentifier}'].delete"
    update:
      operationId: unregister_submodel_descriptor_by_id_for_shell
      summary: Unregister a Submodel descriptor by ID for an AAS
      description: Removes a Submodel descriptor from an Asset Administration Shell in the registry
